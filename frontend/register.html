<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StreamingHub · Registrarse</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />

    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

    <style>
        #particles-js {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .auth-container {
            position: relative;
            z-index: 1;
        }

        .auth-card {
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
        }

        .auth-logo {
            text-align: center;
            padding: 12px 0;
            min-height: 70px;
        }
        .auth-logo .logo-icon {
            font-size: 2.8rem;
            color: #3b82f6;
            display: block;
        }
        .auth-logo .logo-text {
            font-size: 2.2rem;
            font-weight: 900;
            background: linear-gradient(135deg, #3b82f6, #22d3ee, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0;
            display: block;
        }
        .auth-logo .logo-slogan {
            font-size: 1rem;
            color: #94a3b8;
            margin-top: 2px;
            display: block;
        }
    </style>
</head>
<body class="auth-page">

    <!-- ===== FONDO DE PARTÍCULAS ===== -->
    <div id="particles-js"></div>

    <div class="auth-container">

        <!-- ===== LOGO (IDÉNTICO A INDEX) ===== -->
        <div class="auth-logo">
            <div class="logo-icon">
                <i class="fas fa-circle-nodes"></i>
            </div>
            <h1 class="logo-text">StreamingHub</h1>
            <p class="logo-slogan">Crea tu cuenta</p>
        </div>

        <!-- ===== TARJETA DE REGISTRO ===== -->
        <div class="auth-card">

            <div class="auth-header">
                <h2>Registrarse</h2>
                <p class="auth-subtitle">Completa tus datos para crear tu cuenta</p>
            </div>

            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label for="regUsername"><i class="fas fa-user"></i> Usuario</label>
                    <input type="text" id="regUsername" placeholder="Elige un nombre de usuario" required />
                </div>

                <div class="form-group">
                    <label for="regEmail"><i class="fas fa-envelope"></i> Correo electrónico</label>
                    <input type="email" id="regEmail" placeholder="tu@email.com" required />
                </div>

                <div class="form-group">
                    <label for="regPassword"><i class="fas fa-lock"></i> Contraseña</label>
                    <input type="password" id="regPassword" placeholder="Mínimo 6 caracteres" required />
                </div>

                <div class="form-group">
                    <label for="regConfirmPassword"><i class="fas fa-check-circle"></i> Confirmar contraseña</label>
                    <input type="password" id="regConfirmPassword" placeholder="Repite tu contraseña" required />
                </div>

                <button type="submit" class="auth-btn">
                    <i class="fas fa-user-plus"></i> Crear cuenta
                </button>

                <div id="registerMessage" class="auth-message"></div>
            </form>

            <div class="auth-footer">
                <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
            </div>
        </div>

        <!-- ===== FOOTER ===== -->
        <footer class="auth-footer-bottom">
            <p class="auth-copyright">
                <i class="far fa-copyright"></i> 2026 StreamingHub · Todos los derechos reservados
            </p>
        </footer>
    </div>

    <script src="js/register.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof particlesJS !== 'undefined') {
                particlesJS('particles-js', {
                    particles: {
                        number: { value: 80, density: { enable: true, value_area: 800 } },
                        color: { value: '#3b82f6' },
                        shape: { type: 'circle' },
                        opacity: {
                            value: 0.5,
                            random: true,
                            anim: { enable: true, speed: 1, opacity_min: 0.1 }
                        },
                        size: {
                            value: 3,
                            random: true,
                            anim: { enable: true, speed: 2, size_min: 0.1 }
                        },
                        line_linked: {
                            enable: true,
                            distance: 150,
                            color: '#3b82f6',
                            opacity: 0.2,
                            width: 1
                        },
                        move: {
                            enable: true,
                            speed: 2,
                            direction: 'none',
                            random: true,
                            straight: false,
                            out_mode: 'out'
                        }
                    },
                    interactivity: {
                        detect_on: 'canvas',
                        events: {
                            onhover: { enable: true, mode: 'grab' },
                            onclick: { enable: true, mode: 'push' },
                            resize: true
                        },
                        modes: {
                            grab: { distance: 140, line_linked: { opacity: 0.5 } },
                            push: { particles_nb: 4 }
                        }
                    },
                    retina_detect: true
                });
            }
        });
    </script>
</body>
</html>
